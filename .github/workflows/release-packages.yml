name: Release Packages

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  SDKDIR: /builder
  REPO_NAME: luci-app-nginx-manager
  PKG_NAME: luci-app-nginx-manager

jobs:
  check-version:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Extract version
        id: version
        run: |
          PKG_VERSION=$(sed -n 's/^PKG_VERSION:=\(.*\)/\1/p' Makefile)
          PKG_RELEASE=$(sed -n 's/^PKG_RELEASE:=\(.*\)/\1/p' Makefile)
          echo "tag=v${PKG_VERSION}-${PKG_RELEASE}" >> "$GITHUB_OUTPUT"
      - name: Check if tag exists
        id: check
        run: |
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Create and push tag
        if: steps.check.outputs.should_release == 'true'
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"

  build:
    name: Build ${{ matrix.pkgtype }} (${{ matrix.branch }})
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/openwrt/sdk:${{ matrix.arch }}-${{ matrix.branch }}
      options: --user root
    strategy:
      fail-fast: false
      matrix:
        include:
          - branch: v24.10.5
            version: "24.10.5"
            pkgtype: ipk
            arch: x86_64
          - branch: v25.12.0
            version: "25.12.0"
            pkgtype: apk
            arch: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: ${{ env.REPO_NAME }}

      - name: Fix SDK paths
        run: |
          mkdir -p "$SDKDIR/shared-workdir"
          rm -rf "$SDKDIR/shared-workdir/build"
          ln -sf "$SDKDIR" "$SDKDIR/shared-workdir/build"

      - name: Update feeds
        working-directory: ${{ env.SDKDIR }}
        run: |
          ./scripts/feeds update base packages luci
          ./scripts/feeds install luci-base nginx-ssl nginx-util rpcd rpcd-mod-file openssl-util

      - name: Prepare package source
        working-directory: ${{ env.SDKDIR }}
        run: |
          rm -rf "./package/$PKG_NAME"
          mkdir -p "./package/$PKG_NAME"
          cp -a "$GITHUB_WORKSPACE/$REPO_NAME/." "./package/$PKG_NAME/"

      - name: Configure
        working-directory: ${{ env.SDKDIR }}
        run: |
          echo "CONFIG_PACKAGE_${PKG_NAME}=y" >> .config
          make defconfig

      - name: Build package
        working-directory: ${{ env.SDKDIR }}
        run: |
          make "package/$PKG_NAME/compile" V=sc

      - name: Collect packages
        working-directory: ${{ env.SDKDIR }}
        run: |
          mkdir -p "$GITHUB_WORKSPACE/release-artifacts"
          package_files="$(find ./bin/ -type f -name "${PKG_NAME}*.${{ matrix.pkgtype }}")"
          if [ -z "$package_files" ]; then
            echo "::error::No ${PKG_NAME} .${{ matrix.pkgtype }} package was produced"
            find ./bin/ -type f -name "*.${{ matrix.pkgtype }}" -print
            exit 1
          fi
          printf '%s\n' "$package_files" | while IFS= read -r file; do
            cp "$file" "$GITHUB_WORKSPACE/release-artifacts/"
          done
          ls -la "$GITHUB_WORKSPACE/release-artifacts/"

      - name: Generate build info
        working-directory: release-artifacts
        run: |
          cat > "buildinfo_${{ matrix.version }}_${{ matrix.arch }}.txt" <<EOF
          Git Commit: ${{ github.sha }}
          Git Tag: ${{ github.ref_name }}
          OpenWrt Version: ${{ matrix.version }}
          SDK Arch: ${{ matrix.arch }}
          Package Type: ${{ matrix.pkgtype }}
          Build Time: $(date -u '+%Y-%m-%d %H:%M:%S UTC')
          Built Package Filenames:
          $(find . -maxdepth 1 \( -name '*.ipk' -o -name '*.apk' \) -exec basename {} \;)
          EOF

      - name: Generate SHA256 checksums
        working-directory: release-artifacts
        run: |
          find . -maxdepth 1 -type f \( -name '*.ipk' -o -name '*.apk' -o -name 'buildinfo_*.txt' \) -exec sha256sum {} + > sha256sums.txt
          cat sha256sums.txt

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.pkgtype }}
          path: release-artifacts/
          retention-days: 30

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          pattern: release-*

      - name: Collect all release files
        run: |
          mkdir -p release-final
          find all-artifacts -type f \( -name '*.ipk' -o -name '*.apk' -o -name 'buildinfo_*.txt' \) -exec cp {} release-final/ \;
          cat all-artifacts/release-*/sha256sums.txt > release-final/sha256sums.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-final/**
          generate_release_notes: true
          body: |
            ## luci-app-nginx-manager ${{ github.ref_name }}

            ### Installation
            Download the appropriate package for your OpenWrt version and architecture:

            - `.ipk` files for OpenWrt 24.10.x (opkg)
            - `.apk` files for OpenWrt 25.12+ / snapshot (apk)

            Install with:
            ```sh
            opkg install luci-app-nginx-manager_*.ipk
            # or
            apk add luci-app-nginx-manager_*.apk
            ```

            Verify checksums with:
            ```sh
            sha256sum -c sha256sums.txt
            ```
