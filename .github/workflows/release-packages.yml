name: Release Packages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  SDKDIR: /builder
  REPO_NAME: luci-app-nginx-manager
  PKG_NAME: luci-app-nginx-manager

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
      version: ${{ steps.check.outputs.version }}
      release: ${{ steps.check.outputs.release }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Check package version
        id: check
        run: |
          PKG_VERSION=$(sed -n 's/^PKG_VERSION:=\(.*\)/\1/p' Makefile)
          PKG_RELEASE=$(sed -n 's/^PKG_RELEASE:=\(.*\)/\1/p' Makefile)
          TAG="v${PKG_VERSION}-${PKG_RELEASE}"

          if [ -z "$PKG_VERSION" ] || [ -z "$PKG_RELEASE" ]; then
            echo "::error::PKG_VERSION or PKG_RELEASE is missing from Makefile"
            exit 1
          fi

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual trigger, proceeding with build"
            {
              echo "changed=true"
              echo "version=${PKG_VERSION}"
              echo "release=${PKG_RELEASE}"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git tag -l "$TAG" | grep -q .; then
            echo "Tag ${TAG} already exists, skipping"
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "New version detected: ${TAG}"
          {
            echo "changed=true"
            echo "version=${PKG_VERSION}"
            echo "release=${PKG_RELEASE}"
          } >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.pkgtype }} (${{ matrix.branch }})
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/openwrt/sdk:${{ matrix.arch }}-${{ matrix.branch }}
      options: --user root
    strategy:
      fail-fast: false
      matrix:
        include:
          - branch: v24.10.5
            version: "24.10.5"
            pkgtype: ipk
            arch: x86_64
          - branch: v25.12.0
            version: "25.12.0"
            pkgtype: apk
            arch: x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          path: ${{ env.REPO_NAME }}

      - name: Fix SDK paths
        run: |
          mkdir -p "$SDKDIR/shared-workdir"
          rm -rf "$SDKDIR/shared-workdir/build"
          ln -sf "$SDKDIR" "$SDKDIR/shared-workdir/build"

      - name: Cache SDK build
        uses: HiGarfield/cachewrtbuild@main
        with:
          mixkey: ${{ matrix.branch }}
          prefix: ${{ env.SDKDIR }}

      - name: Update feeds
        working-directory: ${{ env.SDKDIR }}
        run: |
          ./scripts/feeds update base packages luci
          ./scripts/feeds install luci-base nginx-ssl nginx-util rpcd rpcd-mod-file openssl-util

      - name: Prepare package source
        working-directory: ${{ env.SDKDIR }}
        run: |
          rm -rf "./package/$PKG_NAME"
          mkdir -p "./package/$PKG_NAME"
          cp -a "$GITHUB_WORKSPACE/$REPO_NAME/." "./package/$PKG_NAME/"

      - name: Configure
        working-directory: ${{ env.SDKDIR }}
        run: |
          echo "CONFIG_PACKAGE_${PKG_NAME}=y" >> .config
          make defconfig

      - name: Build package
        working-directory: ${{ env.SDKDIR }}
        run: |
          make "package/$PKG_NAME/compile" V=sc

      - name: Collect packages
        working-directory: ${{ env.SDKDIR }}
        run: |
          mkdir -p "$GITHUB_WORKSPACE/output"
          package_files="$(find ./bin/ -type f -name "${PKG_NAME}*.${{ matrix.pkgtype }}")"
          if [ -z "$package_files" ]; then
            echo "::error::No ${PKG_NAME} .${{ matrix.pkgtype }} package was produced"
            find ./bin/ -type f -name "*.${{ matrix.pkgtype }}" -print
            exit 1
          fi
          printf '%s\n' "$package_files" | while IFS= read -r file; do
            cp "$file" "$GITHUB_WORKSPACE/output/"
          done
          ls -la "$GITHUB_WORKSPACE/output/"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.pkgtype }}
          path: output/
          retention-days: 30

  release:
    name: Create Release
    needs: [check-version, build]
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release/

      - name: List artifacts
        run: |
          find release/ -type f -ls

      - name: Generate checksums
        working-directory: release
        run: |
          find . -type f \( -name '*.ipk' -o -name '*.apk' \) -exec sha256sum {} + > sha256sums.txt
          cat sha256sums.txt

      - name: Delete existing release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ needs.check-version.outputs.version }}-${{ needs.check-version.outputs.release }}"
          gh release delete "$TAG" --yes --cleanup-tag 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.check-version.outputs.version }}-${{ needs.check-version.outputs.release }}
          name: v${{ needs.check-version.outputs.version }}-${{ needs.check-version.outputs.release }}
          body: |
            ## luci-app-nginx-manager v${{ needs.check-version.outputs.version }}-${{ needs.check-version.outputs.release }}

            ### Installation
            Download the appropriate package for your OpenWrt version and architecture:

            - `.ipk` files for OpenWrt 24.10.x (opkg)
            - `.apk` files for OpenWrt 25.12+ / snapshot (apk)

            Install with:
            ```sh
            opkg install luci-app-nginx-manager_*.ipk
            # or
            apk add luci-app-nginx-manager_*.apk
            ```

            Verify checksums with:
            ```sh
            sha256sum -c sha256sums.txt
            ```
          files: |
            release/ipk/*.ipk
            release/apk/*.apk
            release/sha256sums.txt
